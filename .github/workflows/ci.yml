name: CI

on:
  pull_request:
  push:
    branches:
      - main

jobs:
  build-macos:
    runs-on: macos-14

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Resolve snapshot version
        shell: bash
        run: |
          echo "VERSION=sha-${GITHUB_SHA::7}" >> "$GITHUB_ENV"

      - name: Build release artifacts
        run: make dmg VERSION="$VERSION" ARCHS="arm64 x86_64"

      - name: Upload macOS artifacts
        uses: actions/upload-artifact@v4
        with:
          name: xdr-boost-${{ env.VERSION }}-macos
          path: |
            dist/XDR Boost.app
            dist/*.dmg
          if-no-files-found: error
